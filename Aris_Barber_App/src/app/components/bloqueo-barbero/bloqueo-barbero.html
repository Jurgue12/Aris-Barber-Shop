<!-- ========== CARD PRINCIPAL PARA BLOQUEAR HORARIO ========== -->
<mat-card class="rounded-2xl shadow-xl border border-gray-300 bg-white mb-8">

  <!-- ENCABEZADO -->
  <div class="flex items-center gap-3 px-6 py-4 bg-gradient-to-r from-red-500 to-red-700 rounded-t-2xl text-white">
    <mat-icon class="text-3xl">block</mat-icon>
    <h2 class="text-2xl font-bold tracking-wide">Bloquear horario</h2>
  </div>

  <!-- CAMPOS -->
  <div class="p-6 grid grid-cols-1 md:grid-cols-5 gap-4">

    <!-- FECHA -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Fecha</mat-label>
      <input matInput [matDatepicker]="pickerBloq" [(ngModel)]="bloqFecha">
      <mat-datepicker-toggle matSuffix [for]="pickerBloq"></mat-datepicker-toggle>
      <mat-datepicker #pickerBloq></mat-datepicker>
    </mat-form-field>

    <!-- INICIO -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Hora inicio</mat-label>
      <input matInput type="time" [(ngModel)]="bloqHoraInicio">
    </mat-form-field>

    <!-- FIN -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Hora fin</mat-label>
      <input matInput type="time" [(ngModel)]="bloqHoraFin">
    </mat-form-field>

    <!-- MOTIVO -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Motivo</mat-label>
      <input matInput [(ngModel)]="bloqMotivo">
    </mat-form-field>

    <!-- BOTÓN AGREGAR -->
    <div class="flex items-center justify-center">
      <button mat-fab color="primary" class="btn-agregar" (click)="crearBloqueo()">
        <mat-icon>add</mat-icon>
      </button>
    </div>

  </div>
</mat-card>

<mat-card class="rounded-2xl shadow-xl border border-gray-300 bg-white p-6">

  <h3 class="text-2xl font-bold mb-6 text-gray-700 flex items-center gap-2">
    <mat-icon class="text-blue-600">schedule</mat-icon>
    Horarios bloqueados
  </h3>

  <div class="overflow-x-auto">

    <table mat-table [dataSource]="bloqueos" class="min-w-full">

      <!-- FECHA -->
      <ng-container matColumnDef="fecha">
        <th mat-header-cell *matHeaderCellDef class="th-col">Fecha</th>
        <td mat-cell *matCellDef="let b" class="td-col">
          {{ b.inicio | date:'fullDate':'es-CR' }}
        </td>
      </ng-container>

      <!-- INICIO -->
      <ng-container matColumnDef="inicio">
        <th mat-header-cell *matHeaderCellDef class="th-col">Inicio</th>
        <td mat-cell *matCellDef="let b" class="td-col">
          {{ b.inicio | date:'shortTime' }}
        </td>
      </ng-container>

      <!-- FIN -->
      <ng-container matColumnDef="fin">
        <th mat-header-cell *matHeaderCellDef class="th-col">Fin</th>
        <td mat-cell *matCellDef="let b" class="td-col">
          {{ b.fin | date:'shortTime' }}
        </td>
      </ng-container>

      <!-- MOTIVO -->
      <ng-container matColumnDef="motivo">
        <th mat-header-cell *matHeaderCellDef class="th-col">Motivo</th>
        <td mat-cell *matCellDef="let b" class="td-col">
          {{ b.motivo }}
        </td>
      </ng-container>

      <!-- ACCIONES -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="th-col text-center">Acciones</th>
        <td mat-cell *matCellDef="let b" class="td-col text-center">
          <button mat-icon-button 
                  (click)="eliminarBloqueo(b.id)"
                  class="delete-btn"
                  matTooltip="Eliminar bloqueo">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <!-- FILAS -->
      <tr mat-header-row *matHeaderRowDef="['fecha','inicio','fin','motivo','acciones']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['fecha','inicio','fin','motivo','acciones']"
          class="row-hover"></tr>

    </table>

  </div>

</mat-card>
