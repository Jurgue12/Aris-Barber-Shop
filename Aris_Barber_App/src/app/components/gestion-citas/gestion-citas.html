<mat-card class="rounded-2xl shadow-xl border border-gray-200">


  <div class="bg-gradient-to-r from-blue-600 to-blue-800 rounded-t-2xl p-5 flex items-center gap-3 text-white">
    <mat-icon>event_note</mat-icon>
    <span class="font-bold text-2xl tracking-wide">Gestión de Citas</span>
  </div>

  <mat-card-content class="p-6 space-y-8">

  


    <div class="bg-white border border-gray-200 rounded-xl shadow p-5 flex flex-col md:flex-row gap-5 items-center justify-between">

      <div class="flex flex-col md:flex-row gap-5 w-full md:w-auto">

        <!-- Filtro fecha -->
        <mat-form-field appearance="outline" class="w-56">
          <mat-label>Seleccione la fecha</mat-label>
          <input matInput [matDatepicker]="picker" [(ngModel)]="fechaSeleccionada">
          <mat-datepicker-toggle matSuffix [for]="picker">
            <mat-icon matDatepickerToggleIcon>event</mat-icon>
          </mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <!-- Filtro estado -->
        <mat-form-field appearance="outline" class="w-56">
          <mat-label>Filtrar por estado</mat-label>
          <mat-select [(ngModel)]="estadoSeleccionado" (selectionChange)="filtrarPorEstado()">
            <mat-option value="">Todos</mat-option>
            <mat-option value="pendiente">Pendiente</mat-option>
            <mat-option value="confirmada">Confirmada</mat-option>
            <mat-option value="cancelada">Cancelada</mat-option>
          </mat-select>
        </mat-form-field>

      </div>

      <button mat-raised-button color="primary"
              class="flex items-center gap-2 shadow"
              (click)="buscarCitasPorFecha()">
        <mat-icon>search</mat-icon>
        Buscar citas
      </button>

    </div>

    <!-- =======================
          TABLA DE CITAS
    ======================== -->

    <div class="overflow-x-auto rounded-xl border border-gray-200 shadow">
      <table mat-table [dataSource]="dataSourceCitas()" class="w-full">

        <!-- SERVICIO -->
        <ng-container matColumnDef="servicio">
          <th mat-header-cell *matHeaderCellDef class="bg-gray-100 px-6 py-3 font-semibold text-gray-700">Servicio</th>
          <td mat-cell *matCellDef="let element" class="px-6 py-3">{{ element.servicio }}</td>
        </ng-container>

        <!-- CLIENTE -->
        <ng-container matColumnDef="nombreCliente">
          <th mat-header-cell *matHeaderCellDef class="bg-gray-100 px-6 py-3 font-semibold text-gray-700">Cliente</th>
          <td mat-cell *matCellDef="let element" class="px-6 py-3">{{ element.nombreCliente }}</td>
        </ng-container>

        <!-- FECHA -->
        <ng-container matColumnDef="fechaHora">
          <th mat-header-cell *matHeaderCellDef class="bg-gray-100 px-6 py-3 font-semibold text-gray-700">Fecha y hora</th>
          <td mat-cell *matCellDef="let element" class="px-6 py-3">{{ element.fechaHora | date:'short' }}</td>
        </ng-container>

        <!-- ESTADO -->
        <ng-container matColumnDef="estado">
          <th mat-header-cell *matHeaderCellDef class="bg-gray-100 px-6 py-3 font-semibold text-gray-700">Estado</th>
          <td mat-cell *matCellDef="let element" class="px-6 py-3">
            <span class="px-3 py-1 rounded-full text-sm font-medium"
              [ngClass]="{
                'bg-yellow-100 text-yellow-800': element.estado === 'pendiente',
                'bg-green-100 text-green-800': element.estado === 'confirmada',
                'bg-red-100 text-red-800': element.estado === 'cancelada'
              }">
              {{ element.estado }}
            </span>
          </td>
        </ng-container>

        <!-- OPCIONES -->
        <ng-container matColumnDef="opciones">
          <th mat-header-cell *matHeaderCellDef class="bg-gray-100 px-6 py-3 font-semibold text-center text-gray-700">Opciones</th>
          <td mat-cell *matCellDef="let element" class="px-6 py-3 text-center">
            <div class="flex justify-center gap-2">

   <button mat-icon-button
  class="bg-green-600 hover:bg-green-700 text-white p-2 rounded-full shadow transition hover:scale-110"
  [disabled]="element.estado !== 'pendiente'"
  [ngClass]="{
    'opacity-40 cursor-not-allowed': element.estado !== 'pendiente'
  }"
  [matTooltip]="
    element.estado === 'confirmada'
      ? 'La cita ya está confirmada'
      : (element.estado === 'cancelada'
          ? 'No se puede confirmar una cita cancelada'
          : 'Confirmar cita')
  "
  (click)="onConfirmarCita(element.id)">
    <mat-icon>check_circle</mat-icon>
</button>


<button mat-icon-button
  class="bg-red-600 hover:bg-red-700 text-white p-2 rounded-full shadow transition hover:scale-110"
  [disabled]="element.estado === 'cancelada'"
  [ngClass]="{
    'opacity-40 cursor-not-allowed': element.estado === 'cancelada'
  }"
  [matTooltip]="
    element.estado === 'cancelada'
      ? 'La cita ya está cancelada'
      : 'Cancelar cita'
  "
  (click)="onCancelarCita(element.id)">
    <mat-icon>cancel</mat-icon>
</button>



<button mat-icon-button
  class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-full shadow transition hover:scale-110"
  [disabled]="element.estado === 'cancelada'"
  [ngClass]="{
    'opacity-40 cursor-not-allowed': element.estado === 'cancelada'
  }"
  [matTooltip]="
      element.estado === 'cancelada'
        ? 'No se puede reprogramar una cita cancelada'
        : 'Reprogramar cita'
  "
  (click)="onReprogramarCita(element.id)">
    <mat-icon>edit_calendar</mat-icon>
</button>



            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columnasCitas"></tr>
        <tr mat-row *matRowDef="let row; columns: columnasCitas"></tr>

      </table>
    </div>

    <mat-paginator
      [pageSizeOptions]="[5, 10, 20]"
      showFirstLastButtons>
    </mat-paginator>


    <!-- BOTÓN CERRAR -->
    <div class="flex justify-end mt-6">
      <button mat-stroked-button color="warn"
        [routerLink]="['/home']"
        class="flex items-center gap-2 px-6 py-2 rounded-full border border-red-600 text-red-600 hover:bg-red-600 hover:text-white shadow">
        <mat-icon>close</mat-icon>
        Cerrar
      </button>
    </div>

  </mat-card-content>
</mat-card>
