

<mat-card class="bg-white shadow-lg rounded-lg">
    <div class="p-6 bg-white border-gray-200 rounded-lg   
    shadow-sm dark:bg-white-800 dark:border-white-700"  >
    <mat-card-header class="bg-gray-200 h-15 flex justify-center">
        <img mat-card-avatar>
        <mat-card-title class="!font-extrabold text-[1.5rem]">
            Catálogo de Servicios
        </mat-card-title>
    </mat-card-header>
   

    <mat-card-content class="relative overflow-x-auto shadow-md sm:rounded-lg p-4">
  <table mat-table [dataSource]="dataSource()" class="w-full border-separate border-spacing-y-2">

        <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
            
             
          

            <ng-container matColumnDef="nombre" >
                <th mat-header-cell *matHeaderCellDef class="px-6 py-3 text-left font-bold text-sm text-gray-700 bg-gray-100 rounded-md">
                    Nombre

                </th>
                <td mat-cell *matCellDef="let element" class="px-6 py-4 bg-white rounded-md shadow-sm">
                    {{element.nombre}} </td>
            </ng-container>

            <ng-container matColumnDef="descripcion" >
                <th mat-header-cell *matHeaderCellDef class="px-6 py-3 text-left font-bold text-sm text-gray-700 bg-gray-100 rounded-md">Descripcion</th>
                <td mat-cell *matCellDef="let element" class="px-6 py-4 bg-white rounded-md shadow-sm">{{element.descripcion}}</td>
            </ng-container>

            <ng-container matColumnDef="duracion">
                <th mat-header-cell *matHeaderCellDef class="px-6 py-3 text-left font-bold text-sm text-gray-700 bg-gray-100 rounded-md">Duración</th>
                <td mat-cell *matCellDef="let element" class="px-6 py-4 bg-white rounded-md shadow-sm">{{element.duracion}} minutos</td>
            </ng-container>

            <ng-container matColumnDef="precio">
                <th mat-header-cell *matHeaderCellDef class="px-6 py-3 text-left font-bold text-sm text-gray-700 bg-gray-100 rounded-md">Precio</th>
                <td mat-cell *matCellDef="let element" class="px-6 py-4 bg-white rounded-md shadow-sm"> ₡{{element.precio}}</td>
            </ng-container>

            <ng-container matColumnDef="categoria">
                <th mat-header-cell *matHeaderCellDef class="px-6 py-3 text-left font-bold text-sm text-gray-700 bg-gray-100 rounded-md">Categoría</th>
                <td mat-cell *matCellDef="let element" class="px-6 py-4 bg-white rounded-md shadow-sm">{{element.categoria}}</td>
            </ng-container>

         

            <ng-container matColumnDef="botonera">
                <th mat-header-cell *matHeaderCellDef class="px-6 py-3 text-left font-bold text-sm text-gray-700 bg-gray-100 rounded-md" >
                    <button mat-icon-button (click)="onNuevo()"
                     matTooltip="Agregar nuevo servicio"
        matTooltipPosition="below"
        matTooltipShowDelay="300"  class=" flex content-center text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300
                        font-medium rounded-lg text-sm px-5 py-2.5 me-2 mb-2
                        dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none
                        dark:focus:ring-blue-800">
                        <mat-icon >
                            add
                        </mat-icon>
                    </button>
                </th >
                <td mat-cell *matCellDef="let element">
                      <div class="flex space-around">
                      
                         <button mat-icon-button (click)="onEditar(element.idServicio)"
                         class="flex content-center bg-yellow-700  text-white hover:bg-yellow-800 focus:ring-4 focus:ring-yellow-400
                          font-medium rounded-lg text-sm px-3 py-1 mx-2
                          dark:bg-yellow-600 dark:hover:bg-yellow-700 
                          focus:outline-none dark:focus:ring-yellow-900">
                            <mat-icon>edit</mat-icon>
                        </button>

                          <button mat-icon-button (click)="onEliminar(element.idServicio)"
                           class="flex content-center  bg-red-700  text-white hover:bg-red-800 focus:ring-4 focus:ring-red-300
                          font-medium rounded-lg text-sm px-3 py-1 mx-2
                          dark:bg-red-600 dark:hover:bg-red-700 focus:outline-none dark:focus:ring-red-800">
                            <mat-icon>delete</mat-icon>
                        </button>

                    </div>
                </td>

            </ng-container>

           
        </thead>

        <tr mat-header-row *matHeaderRowDef="columnas"></tr>
        <tr mat-row *matRowDef="let row;columns: columnas"></tr>
       
      
        </table>
           <mat-paginator [pageSizeOptions]="[1,5,10]"
       showFirstLastButtons
          aria-label="Select page of periodic elements">

               </mat-paginator>
    </mat-card-content>
   
  
    </div>
</mat-card>
