<h2 mat-dialog-title class="flex items-center gap-2 text-2xl font-bold text-slate-800 pb-2">
  <mat-icon>lock</mat-icon> Cambiar Contraseña
</h2>

<mat-divider></mat-divider>

<form [formGroup]="form" (ngSubmit)="cambiar()" class="p-6 space-y-6">

  <!-- Contraseña actual -->
  <mat-form-field appearance="outline" class="w-full">
    <mat-label>Contraseña actual</mat-label>
    <input matInput type="password" formControlName="passw" required>
    <mat-error *ngIf="form.controls['passw']?.hasError('required')">
      La contraseña actual es requerida
    </mat-error>
  </mat-form-field>

  <!-- Nueva contraseña -->
  <mat-form-field appearance="outline" class="w-full">
    <mat-label>Nueva contraseña</mat-label>
    <input matInput type="password" formControlName="passwN" required>
    <mat-error *ngIf="form.controls['passwN']?.hasError('required')">
      La nueva contraseña es requerida
    </mat-error>
  </mat-form-field>



  <!-- Botones -->
  <div class="flex justify-end gap-3 pt-4">
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
      <mat-icon>save</mat-icon> Guardar
    </button>
    <button mat-stroked-button color="warn" type="button" (click)="cancelar()">
      <mat-icon>close</mat-icon> Cancelar
    </button>
  </div>

</form>
