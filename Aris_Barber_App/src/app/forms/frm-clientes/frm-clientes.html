
<h2 mat-dialog-title>Agregar Nuevo Cliente</h2>
<mat-dialog-content>
<form id="miFormulario" [formGroup]="myForm" (ngSubmit)="onGuardar()">
 <div class="flex flex-col">
  

<div class="md:flex justify-between">
   

</div>

<mat-form-field >
    <mat-label>Id Cliente</mat-label>
    <input formControlName="idCliente" matInput type="text" >
   </mat-form-field >
  


   <mat-form-field  >
    <mat-label>Nombre</mat-label>
    <input formControlName="nombre" matInput type="text" >
   </mat-form-field >

   <mat-form-field  >
    <mat-label>Primer apellido</mat-label>
    <input formControlName="apellido1" matInput type="text" >
   </mat-form-field >

   <mat-form-field  >
    <mat-label>Segundo apellido</mat-label>
    <input formControlName="apellido2" matInput type="text" >
   </mat-form-field >

   <mat-form-field  >
    <mat-label>Celular</mat-label>
    <input formControlName="celular" matInput type="text" >
   </mat-form-field >

   <mat-form-field>
    <mat-label>Correo</mat-label>
    <input formControlName="correo" matInput type="text" >
   </mat-form-field>
    
   

 </div>
 <input type="hidden" formControlName="id">


</form>
</mat-dialog-content>
<mat-dialog-actions>
 <button type="submit"form="miFormulario" mat-button><mat-icon>save</mat-icon>Guardar</button>
<button mat-button [mat-dialog-close]="false"><mat-icon>cancel</mat-icon>Cancelar</button>


</mat-dialog-actions>
