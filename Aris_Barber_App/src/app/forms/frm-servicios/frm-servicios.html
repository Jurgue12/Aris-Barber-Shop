
<h2 mat-dialog-title>Agregar Nuevo Servicio</h2>
<mat-dialog-content>
<form id="miFormulario" [formGroup]="myForm" (ngSubmit)="onGuardar()">
 <div class="flex flex-col">
  

<div class="md:flex justify-between">
       <mat-form-field  class="w-full md:w-fit">

    <mat-label>Nombre</mat-label>
    <input formControlName="nombre" matInput type="text" >
   </mat-form-field >
  
      <mat-form-field  class="w-full md:w-fit">
    <mat-label>Descripción</mat-label>
    <input formControlName="descripcion" matInput type="text" >
   </mat-form-field>
      <mat-form-field  class="w-full md:w-fit">
    <mat-label>Duración</mat-label>
    <input formControlName="duracion" matInput type="text" >
   </mat-form-field>

</div>

   <mat-form-field>
    <mat-label>Precio</mat-label>
    <input formControlName="precio" matInput type="text" >
   </mat-form-field>
      <mat-form-field>
    <mat-label>Categoria</mat-label>
    <input formControlName="categoria" matInput type="text" >
   </mat-form-field>
   


 </div>
 <input type="hidden" formControlName="id">


</form>
</mat-dialog-content>
<mat-dialog-actions>
 <button type="submit"form="miFormulario" mat-button><mat-icon>save</mat-icon>Guardar</button>
<button mat-button [mat-dialog-close]="false"><mat-icon>cancel</mat-icon>Cancelar</button>


</mat-dialog-actions>
